<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sylvaria POS V2</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.hidden{display:none}
button{cursor:pointer}

.sidebar{
width:220px;position:fixed;top:0;bottom:0;background:#111827;padding:20px
}

.main{margin-left:220px;padding:20px}

.tab{padding:12px;margin:8px 0;background:#1f2937;border-radius:10px}

.card{background:#1e293b;padding:15px;border-radius:10px;margin:10px 0}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

.product{background:#111827;padding:10px;border-radius:10px;cursor:pointer}

.product:hover{background:#2563eb}

.small{font-size:12px;color:#aaa}

.receipt{background:white;color:black;padding:20px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Sylvaria POS V2</h2>
  <input id="email" placeholder="email"><br><br>
  <input id="password" type="password" placeholder="password"><br><br>
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
  <div class="tab" onclick="openTab('pos')">🧾 POS</div>
  <div class="tab" onclick="openTab('products')">📦 Products</div>
  <div class="tab" onclick="openTab('orders')">📊 Orders</div>
  <div class="tab" onclick="openTab('analytics')">📈 Analytics</div>
  <div class="tab" onclick="logout()">🚪 Logout</div>
</div>

<div class="main">

<!-- POS -->
<div id="pos">
  <h2>POS</h2>

  <div class="grid" id="productGrid"></div>

  <div class="card">
    <h3>Cart</h3>
    <div id="cart"></div>
    <h4>Total: $<span id="total">0</span></h4>

    <input id="pay" placeholder="payment" type="number"/>
    <button onclick="checkout()">Checkout</button>
    <button onclick="undoOrder()">Undo Last Order</button>
  </div>
</div>

<!-- PRODUCTS -->
<div id="products" class="hidden">
  <h2>Products</h2>

  <input id="pname" placeholder="name">
  <input id="pprice" placeholder="price">
  <input id="pstock" placeholder="stock">
  <button onclick="addProduct()">Add</button>

  <div id="productList"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="hidden">
  <h2>Orders</h2>
  <div id="orderList"></div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="hidden">
  <h2>Analytics</h2>
  <canvas id="chart"></canvas>
</div>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey:"YOUR_KEY",
  authDomain:"YOUR_DOMAIN",
  projectId:"YOUR_PROJECT"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

db.enablePersistence().catch(()=>{});

let cart=[];
let lastOrder=null;
let products=[];

/* ---------------- AUTH ---------------- */

function login(){
auth.signInWithEmailAndPassword(
email.value,password.value
).then(()=>{

login.style.display="none";
app.classList.remove("hidden");

loadProducts();
loadOrders();
})
}

auth.onAuthStateChanged(u=>{
if(u){
login.style.display="none";
app.classList.remove("hidden");
loadProducts();
loadOrders();
}
})

function logout(){auth.signOut();location.reload()}

/* ---------------- NAV ---------------- */

function openTab(id){
pos.classList.add("hidden");
products.classList.add("hidden");
orders.classList.add("hidden");
analytics.classList.add("hidden");

document.getElementById(id).classList.remove("hidden");
}

/* ---------------- PRODUCTS ---------------- */

async function addProduct(){
await db.collection("products").add({
name:pname.value,
price:Number(pprice.value),
stock:Number(pstock.value)
});
loadProducts();
}

async function loadProducts(){
productGrid.innerHTML="";
productList.innerHTML="";
products=[];

let snap=await db.collection("products").get();

snap.forEach(d=>{
let p={id:d.id,...d.data()};
products.push(p);

productGrid.innerHTML+=`
<div class="product" onclick="addToCart('${p.id}')">
${p.name}<br>$${p.price}<br>
<span class="small">Stock: ${p.stock}</span>
</div>`;

productList.innerHTML+=`
<div class="card">
${p.name} | $${p.price} | stock ${p.stock}
<button onclick="deleteProduct('${p.id}')">delete</button>
</div>`;
});
}

function deleteProduct(id){
db.collection("products").doc(id).delete();
loadProducts();
}

/* ---------------- CART ---------------- */

function addToCart(id){
let p=products.find(x=>x.id===id);
cart.push(p);
renderCart();
}

function renderCart(){
cartDiv="";
let total=0;

cart.forEach(i=>{
total+=i.price;
cartDiv+=`<div>${i.name} $${i.price}</div>`;
})

cart.innerHTML=cartDiv;
totalSpan.innerText=total;
}

/* ---------------- CHECKOUT ---------------- */

async function checkout(){
let total=0;
cart.forEach(i=>total+=i.price);

let payment=Number(pay.value);
if(payment<total)return alert("not enough");

let order={
items:cart,
total,
time:Date.now()
};

await db.collection("orders").add(order);

lastOrder=order;

/* inventory update */
for(let i of cart){
let ref=db.collection("products").doc(i.id);
let doc=await ref.get();
ref.update({stock:doc.data().stock-1});
}

cart=[];
renderCart();
loadOrders();
loadProducts();
}

/* ---------------- UNDO ORDER ---------------- */

async function undoOrder(){
if(!lastOrder)return;

await db.collection("orders").add({
...lastOrder,
reversed:true
});

lastOrder=null;
alert("Order undone (logged reversal)");
}

/* ---------------- ORDERS + REFUNDS ---------------- */

async function loadOrders(){
orderList.innerHTML="";
let snap=await db.collection("orders").orderBy("time","desc").get();

snap.forEach(d=>{
let o=d.data();

orderList.innerHTML+=`
<div class="card">
Total: $${o.total}
<button onclick="refund('${d.id}')">Refund</button>
<button onclick="printReceipt('${d.id}')">Receipt</button>
</div>`;
});
}

async function refund(id){
let ref=db.collection("orders").doc(id);
let o=(await ref.get()).data();

await ref.update({refunded:true});

/* restore stock */
for(let i of o.items){
let p=db.collection("products").doc(i.id);
let doc=await p.get();
p.update({stock:doc.data().stock+1});
}

alert("Refund processed");
}

/* ---------------- RECEIPT ---------------- */

async function printReceipt(id){
let o=(await db.collection("orders").doc(id).get()).data();

let win=window.open("");
win.document.write(`
<div class="receipt">
<h2>RECEIPT</h2>
${o.items.map(i=>`<div>${i.name} $${i.price}</div>`).join("")}
<h3>Total: $${o.total}</h3>
</div>
`);
win.print();
}

/* ---------------- ANALYTICS ---------------- */

async function loadAnalytics(){
let snap=await db.collection("orders").get();

let map={};
snap.forEach(d=>{
d.data().items.forEach(i=>{
map[i.name]=(map[i.name]||0)+i.price;
});
});

let labels=Object.keys(map);
let data=Object.values(map);

new Chart(chart,{
type:"bar",
data:{labels,datasets:[{data}]}
});
}
</script>

</body>
</html>
